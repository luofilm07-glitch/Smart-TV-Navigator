kind = "web"
previewPath = "/"
title = "Streaming TV"
version = "1.0.0"
id = "artifacts/streaming-tv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23611

[services.development]
run = "pnpm --filter @workspace/streaming-tv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streaming-tv", "run", "build" ]
publicDir = "artifacts/streaming-tv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23611"
BASE_PATH = "/"
